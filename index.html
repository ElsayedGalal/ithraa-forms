<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الخدمات - إثراء الجود</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #00334D 0%, #005D92 50%, #00AABF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .brand-text { color: #C29979; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            cursor: pointer;
        }
    </style>
</head>
<body class="p-6">

    <div class="text-center mb-16 animate__animated animate__fadeInDown">
        <h1 class="brand-text text-5xl font-black mb-4">إثراء الجود</h1>
        <p class="text-white text-xl opacity-90 font-bold">يرجى اختيار نوع قطاع الأعمال</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-4xl animate__animated animate__zoomIn">
        
        <a href="b2b_page.html" class="glass-card group p-10 rounded-[2.5rem] flex flex-col items-center justify-center hover:scale-105 transition-all shadow-2xl border-b-8 border-[#C29979]">
            <div class="bg-[#00334D]/10 p-6 rounded-3xl mb-6 group-hover:bg-[#C29979]/20 transition-colors">
                <span class="text-6xl">🏢</span>
            </div>
            <h2 class="text-[#00334D] font-black text-4xl mb-2">B2B</h2>
            <span class="text-gray-500 font-bold text-lg italic tracking-widest uppercase">Business to Business</span>
        </a>

        <a href="b2b2c_page.html" class="glass-card group p-10 rounded-[2.5rem] flex flex-col items-center justify-center hover:scale-105 transition-all shadow-2xl border-b-8 border-[#C29979]">
            <div class="bg-[#00334D]/10 p-6 rounded-3xl mb-6 group-hover:bg-[#C29979]/20 transition-colors">
                <span class="text-6xl">🤝</span>
            </div>
            <h2 class="text-[#00334D] font-black text-4xl mb-2">B2B2C</h2>
            <span class="text-gray-500 font-bold text-lg italic tracking-widest uppercase">Business to Business to Consumer</span>
        </a>

    </div>

    <div class="mt-20 text-white/50 text-sm">
        جميع الحقوق محفوظة لشركة إثراء الجود © 2026
    </div>

</body>
</html>
