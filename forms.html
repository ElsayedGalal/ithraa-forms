<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نماذج متابعة المشاعر - إثراء الجود</title>
    <!-- استدعاء Tailwind CSS و Animate.css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #00334D 0%, #005D92 50%, #00AABF 100%);
            min-height: 100vh;
        }
        .brand-text { color: #C29979; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }
    </style>
</head>
<body class="py-10 px-4 flex flex-col items-center">

    <!-- العنوان الرئيسي -->
    <div class="text-center mb-12 animate__animated animate__fadeInDown">
        <h1 class="brand-text text-5xl font-black mb-4">إثراء الجود</h1>
        <h2 class="text-white text-2xl font-bold opacity-90">نماذج تقييم الخدمة المقدمة لمرحلة تأدية النسك</h2>
    </div>

    <!-- شبكة النماذج الخمسة -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl animate__animated animate__fadeInUp">
        
        <!-- 1- مرحلة مشعر منى (التروية) -->
        <a href="https://forms.cloud.microsoft/r/ga6amDgmFX" target="_blank" class="glass-card p-6 rounded-[2rem] flex items-center justify-between hover:scale-105 transition-all shadow-xl border-l-8 border-[#C29979]">
            <div class="flex flex-col">
                <span class="text-[#00334D] font-black text-xl">مشعر منى</span>
                <span class="text-[#C29979] font-bold text-sm">(يوم التروية)</span>
            </div>
            <div class="bg-[#00334D]/5 p-2 rounded-2xl">
                <img src="tent.png" alt="Tent" class="w-16 h-16 object-contain">
            </div>
        </a>

        <!-- 2- مرحلة مشعر عرفات -->
        <a href="https://forms.cloud.microsoft/r/Jmy1EhNWWg" target="_blank" class="glass-card p-6 rounded-[2rem] flex items-center justify-between hover:scale-105 transition-all shadow-xl border-l-8 border-[#C29979]">
            <div class="flex flex-col">
                <span class="text-[#00334D] font-black text-xl">مشعر عرفات</span>
                <span class="text-[#C29979] font-bold text-sm">(التصعيد)</span>
            </div>
            <div class="bg-[#00334D]/5 p-2 rounded-2xl">
                <img src="arafat.png" alt="Arafat" class="w-16 h-16 object-contain">
            </div>
        </a>

        <!-- 3- مرحلة مشعر مزدلفة -->
        <a href="https://forms.cloud.microsoft/r/RYR2qnwTTT" target="_blank" class="glass-card p-6 rounded-[2rem] flex items-center justify-between hover:scale-105 transition-all shadow-xl border-l-8 border-[#C29979]">
            <div class="flex flex-col">
                <span class="text-[#00334D] font-black text-xl">مشعر مزدلفة</span>
                <span class="text-[#C29979] font-bold text-sm">( النفرة)</sp>
            </div>
            <div class="bg-[#00334D]/5 p-2 rounded-2xl">
                <img src="jamarat mozdalifa.png" alt="Mozdalifa" class="w-16 h-16 object-contain">
            </div>
        </a>

        <!-- 4- مرحلة مشعر منى (التشريق) -->
        <a href="https://forms.cloud.microsoft/r/ntGPvskNLA" target="_blank" class="glass-card p-6 rounded-[2rem] flex items-center justify-between hover:scale-105 transition-all shadow-xl border-l-8 border-[#C29979]">
            <div class="flex flex-col">
                <span class="text-[#00334D] font-black text-xl">مشعر منى</span>
                <span class="text-[#C29979] font-bold text-sm">(أيام التشريق)</span>
            </div>
            <div class="bg-[#00334D]/5 p-2 rounded-2xl">
                <img src="tent.png" alt="Tent" class="w-16 h-16 object-contain">
            </div>
        </a>

        <!-- 5- مرحلة الإرشاد وتأدية النُسك -->
        <a href="https://forms.cloud.microsoft/r/QMkMMH6q6c" target="_blank" class="glass-card p-6 rounded-[2rem] flex items-center justify-between hover:scale-105 transition-all shadow-xl border-l-8 border-[#C29979]">
            <div class="flex flex-col">
                <span class="text-[#00334D] font-black text-xl">الإرشاد والنسك</span>
                <span class="text-[#C29979] font-bold text-sm">(التوجيه الميداني)</span>
            </div>
            <div class="bg-[#00334D]/5 p-2 rounded-2xl">
                <img src="Hajj Map.png" alt="Hajj Map" class="w-16 h-16 object-contain">
            </div>
        </a>

    </div>

    <!-- زر العودة -->
    <a href="index.html" class="mt-12 text-white opacity-80 underline font-bold">العودة للرئيسية</a>

</body>
</html>
